<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي مستكشف الأعلام العالمي - النسخة الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-magenta: #c084fc;
            --neon-green: #4ade80;
            --neon-orange: #fb923c;
            --card-bg: rgba(15, 23, 42, 0.95); /* خلفية داكنة جداً */
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            margin: 0; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
            color: var(--text-primary);
        }

        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 3rem; border-radius: 50px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(56, 189, 248, 0.1);
            text-align: center; width: 95%; 
            max-width: 1000px; /* تكبير مساحة اللعب */
            border: var(--glass-border);
            position: relative;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; font-size: 1.3rem; font-weight: bold;
        }

        .stat-pill {
            background: rgba(255, 255, 255, 0.05); padding: 10px 25px;
            border-radius: 40px; border: var(--glass-border);
            color: var(--neon-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .timer-container {
            width: 100%; height: 14px; background: rgba(255, 255, 255, 0.1);
            border-radius: 20px; margin-bottom: 2.5rem; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #timer-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-magenta));
            border-radius: 20px; transition: width 0.1s linear;
        }

        /* منطقة الخرائط المكبرة */
        .visual-area {
            display: flex; gap: 30px; margin-bottom: 3rem;
            align-items: center; justify-content: center;
            flex-wrap: wrap;
        }

        .world-map-box {
            position: relative; width: 500px; height: 350px; /* تكبير الخريطة */
            border-radius: 30px; overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(0, 0, 0, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .world-bg {
            width: 100%; height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Blank_World_Map_%D8%AE%D8%B1%D9%8A%D8%B7%D8%A9_%D8%A7%D9%84%D8%B9%D8%A7%D9%84%D9%85_%D8%B5%D9%85%D8%A7%D8%A1.png/960px-Blank_World_Map_%D8%AE%D8%B1%D9%8A%D8%B7%D8%A9_%D8%A7%D9%84%D8%B9%D8%A7%D9%84%D9%85_%D8%B5%D9%85%D8%A7%D8%A1.png');
            background-size: contain; background-repeat: no-repeat;
            background-position: center; opacity: 0.2; filter: invert(1);
        }

        .location-dot {
            position: absolute; width: 24px; height: 24px;
            background: var(--neon-orange); border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-orange);
            animation: pulse-ring 1.5s infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(251, 146, 60, 0); } }

        .zoom-box {
            width: 300px; height: 300px; /* تكبير صندوق الزوم */
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px; border: 2px dashed var(--neon-blue);
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #flag-shape {
            width: 250px; height: 250px;
            background-size: cover; background-position: center;
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            -webkit-mask-position: center; mask-position: center;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* الأزرار 2x2 العملاقة */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-top: 1rem;
        }

        button.option {
            padding: 22px; font-size: 1.4rem; border: none; border-radius: 20px;
            cursor: pointer; background: rgba(255, 255, 255, 0.07);
            color: white; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button.option:hover { 
            background: rgba(56, 189, 248, 0.2); 
            border-color: var(--neon-blue);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.2);
        }

        .correct { background: var(--neon-green) !important; color: #064e3b !important; box-shadow: 0 0 30px var(--neon-green) !important; }
        .wrong { background: var(--danger) !important; color: white !important; }

        #result-screen { display: none; }
        .final-score { font-size: 6rem; font-weight: 900; color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="game-card">
        <div id="quiz-ui">
            <div class="stats-bar">
                <div class="stat-pill">جولة: <span id="round-txt">1</span>/10</div>
                <div style="color: var(--neon-magenta)">أفضل نتيجة: <span id="high-score">0</span></div>
                <div class="stat-pill">نقاط: <span id="score-txt">0</span></div>
            </div>
            
            <div class="timer-container"><div id="timer-bar"></div></div>

            <div class="visual-area">
                <div class="world-map-box">
                    <div class="world-bg"></div>
                    <div id="location-dot" class="location-dot"></div>
                </div>
                
                <div class="zoom-box">
                    <div id="flag-shape"></div>
                    <span style="position: absolute; top: 10px; font-size: 12px; color: var(--neon-blue);">حدود الدولة والعلم 🚩</span>
                </div>
            </div>

            <h2 style="margin-bottom: 2rem; letter-spacing: 1px;">أين تقع هذه الدولة المحددة؟</h2>

            <div id="options" class="options-grid"></div>
        </div>

        <div id="result-screen">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">انتهى التحدي! 🏆</h1>
            <p class="final-score" id="final-score-val">0</p>
            <button onclick="location.reload()" style="padding: 20px 50px; border-radius: 40px; border: none; background: var(--neon-blue); color: #0f172a; font-weight: bold; font-size: 1.5rem; cursor: pointer;">العب مجدداً 🔄</button>
        </div>
    </div>

    <script>
        const allCountries = [
            { n: "المملكة العربية السعودية", c: "sa", x: 62, y: 46 },
            { n: "جمهورية مصر العربية", c: "eg", x: 58, y: 39 },
            { n: "الإمارات العربية المتحدة", c: "ae", x: 65.5, y: 45 },
            { n: "المملكة المغربية", c: "ma", x: 47, y: 36 },
            { n: "البرازيل", c: "br", x: 33, y: 65 },
            { n: "أستراليا", c: "au", x: 84, y: 78 },
            { n: "اليابان", c: "jp", x: 86, y: 33 },
            { n: "جمهورية الصين الشعبية", c: "cn", x: 79, y: 38 },
            { n: "فرنسا", c: "fr", x: 50, y: 22 },
            { n: "كندا", c: "ca", x: 23, y: 18 }
        ];

        let gameSet = [], currentIndex = 0, score = 0, timer, timeLeft = 100;

        function initGame() {
            gameSet = [...allCountries].sort(() => Math.random() - 0.5).slice(0, 10);
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= 10) return endGame();

            const current = gameSet[currentIndex];
            document.getElementById('round-txt').innerText = currentIndex + 1;
            document.getElementById('score-txt').innerText = score;

            // تحديث النقطة
            const dot = document.getElementById('location-dot');
            dot.style.left = current.x + "%";
            dot.style.top = current.y + "%";

            // تحديث شكل العلم داخل الدولة
            const shape = document.getElementById('flag-shape');
            shape.style.backgroundImage = `url(https://flagcdn.com/w640/${current.c}.png)`;
            const maskUrl = `https://cdn.jsdelivr.net/gh/djaiss/mapsicon@master/all/${current.c}/512.png`;
            shape.style.webkitMaskImage = `url(${maskUrl})`;
            shape.style.maskImage = `url(${maskUrl})`;

            // خيارات الإجابة
            let options = [current];
            while(options.length < 4) {
                let r = allCountries[Math.floor(Math.random() * allCountries.length)];
                if(!options.find(o => o.c === r.c)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt.n;
                btn.onclick = () => checkAnswer(btn, opt.c === current.c);
                grid.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            timeLeft = 100; clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 1.2;
                document.getElementById('timer-bar').style.width = timeLeft + '%';
                if (timeLeft <= 0) { clearInterval(timer); checkAnswer(null, false); }
            }, 100);
        }

        function checkAnswer(btn, isCorrect) {
            clearInterval(timer);
            const all = document.querySelectorAll('.option');
            all.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                score++;
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 } });
            } else {
                if(btn) btn.classList.add('wrong');
                all.forEach(b => {
                    if(b.innerText === gameSet[currentIndex].n) b.classList.add('correct');
                });
            }

            setTimeout(() => { currentIndex++; showQuestion(); }, 2000);
        }

        function endGame() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score-val').innerText = score + "/10";
        }

        initGame();
    </script>
</body>
</html>

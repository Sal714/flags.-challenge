<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي مستكشف الأعلام العالمي - النسخة التعليمية</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-blue: #38bdf8;
            --neon-magenta: #c084fc;
            --neon-green: #4ade80;
            --neon-orange: #fb923c;
            --card-bg: rgba(15, 23, 42, 0.95);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            margin: 0; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
            color: var(--text-primary);
        }

        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 2.5rem; border-radius: 40px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(56, 189, 248, 0.1);
            text-align: center; width: 95%; 
            max-width: 950px;
            border: var(--glass-border);
            position: relative;
        }

        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; font-size: 1.2rem; font-weight: bold;
        }

        .stat-pill {
            background: rgba(255, 255, 255, 0.05); padding: 8px 20px;
            border-radius: 40px; border: var(--glass-border);
            color: var(--neon-blue);
        }

        .timer-container {
            width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1);
            border-radius: 20px; margin-bottom: 2rem; overflow: hidden;
        }

        #timer-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-magenta));
            border-radius: 20px; transition: width 0.1s linear;
        }

        .visual-area {
            display: flex; gap: 20px; margin-bottom: 2.5rem;
            align-items: center; justify-content: center;
            flex-wrap: wrap;
        }

        .world-map-box {
            position: relative; width: 420px; height: 320px;
            border-radius: 25px; overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(0, 0, 0, 0.2);
        }

        .world-bg {
            width: 100%; height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Blank_World_Map_%D8%AE%D8%B1%D9%8A%D8%B7%D8%A9_%D8%A7%D9%84%D8%B9%D8%A7%D9%84%D9%85_%D8%B5%D9%85%D8%A7%D8%A1.png/960px-Blank_World_Map_%D8%AE%D8%B1%D9%8A%D8%B7%D8%A9_%D8%A7%D9%84%D8%B9%D8%A7%D9%84%D9%85_%D8%B5%D9%85%D8%A7%D8%A1.png');
            background-size: contain; background-repeat: no-repeat;
            background-position: center; opacity: 0.25; filter: invert(1);
        }

        .location-dot {
            position: absolute; width: 20px; height: 20px;
            background: var(--neon-orange); border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-orange);
            animation: pulse-ring 1.5s infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(251, 146, 60, 0); } }

        .zoom-box {
            width: 280px; height: 280px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px; border: 2px dashed var(--neon-blue);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        #flag-shape {
            width: 230px; height: 230px;
            background-size: cover; background-position: center;
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            -webkit-mask-position: center; mask-position: center;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; margin-top: 1rem;
        }

        button.option {
            padding: 18px; font-size: 1.2rem; border: none; border-radius: 18px;
            cursor: pointer; background: rgba(255, 255, 255, 0.08);
            color: white; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        button.option span.en-name { font-size: 0.9rem; font-weight: 400; opacity: 0.8; }

        button.option:hover { 
            background: rgba(56, 189, 248, 0.2); 
            border-color: var(--neon-blue);
            transform: translateY(-3px);
        }

        .correct { background: var(--neon-green) !important; color: #064e3b !important; box-shadow: 0 0 25px var(--neon-green) !important; }
        .wrong { background: var(--danger) !important; color: white !important; }

        #result-screen { display: none; }
    </style>
</head>
<body>

    <div class="game-card">
        <div id="quiz-ui">
            <div class="stats-bar">
                <div class="stat-pill">جولة: <span id="round-txt">1</span>/10</div>
                <div class="stat-pill">نقاط: <span id="score-txt">0</span></div>
            </div>
            
            <div class="timer-container"><div id="timer-bar"></div></div>

            <div class="visual-area">
                <div class="world-map-box">
                    <div class="world-bg"></div>
                    <div id="location-dot" class="location-dot"></div>
                </div>
                
                <div class="zoom-box">
                    <div id="flag-shape"></div>
                    <span style="position: absolute; top: 10px; font-size: 11px; color: var(--neon-blue);">حدود الدولة والعلم 🚩</span>
                </div>
            </div>

            <h2 style="margin-bottom: 1.5rem;">ما هي هذه الدولة؟</h2>

            <div id="options" class="options-grid"></div>
        </div>

        <div id="result-screen">
            <h1 style="font-size: 3rem;">انتهى التحدي! 🏆</h1>
            <p style="font-size: 5rem; font-weight: 900; color: var(--neon-blue);" id="final-score-val">0</p>
            <button onclick="location.reload()" style="padding: 18px 45px; border-radius: 40px; border: none; background: var(--neon-blue); color: #0f172a; font-weight: bold; font-size: 1.3rem; cursor: pointer;">العب مجدداً 🔄</button>
        </div>
    </div>

    <script>
        // مصفوفة الدول باللغتين مع الإحداثيات
        const countries = [
            { ar: "السعودية", en: "Saudi Arabia", c: "sa", x: 62, y: 46 },
            { ar: "مصر", en: "Egypt", c: "eg", x: 58, y: 39 },
            { ar: "الإمارات", en: "UAE", c: "ae", x: 65.5, y: 45 },
            { ar: "المغرب", en: "Morocco", c: "ma", x: 47, y: 36 },
            { ar: "اليابان", en: "Japan", c: "jp", x: 86, y: 33 },
            { ar: "البرازيل", en: "Brazil", c: "br", x: 33, y: 65 },
            { ar: "أستراليا", en: "Australia", c: "au", x: 84, y: 78 },
            { ar: "فرنسا", en: "France", c: "fr", x: 50, y: 22 },
            { ar: "الصين", en: "China", c: "cn", x: 79, y: 38 },
            { ar: "روسيا", en: "Russia", c: "ru", x: 70, y: 15 }
        ];

        let gameSet = [], currentIndex = 0, score = 0, timer, timeLeft = 100;

        function initGame() {
            gameSet = [...countries].sort(() => Math.random() - 0.5).slice(0, 10);
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= 10) return endGame();

            const current = gameSet[currentIndex];
            document.getElementById('round-txt').innerText = currentIndex + 1;
            document.getElementById('score-txt').innerText = score;

            // تحديث النقطة
            const dot = document.getElementById('location-dot');
            dot.style.left = current.x + "%";
            dot.style.top = current.y + "%";

            // تحديث شكل العلم
            const shape = document.getElementById('flag-shape');
            shape.style.backgroundImage = `url(https://flagcdn.com/w640/${current.c}.png)`;
            const maskUrl = `https://cdn.jsdelivr.net/gh/djaiss/mapsicon@master/all/${current.c}/512.png`;
            shape.style.webkitMaskImage = `url(${maskUrl})`;
            shape.style.maskImage = `url(${maskUrl})`;

            // خيارات الإجابة
            let options = [current];
            while(options.length < 4) {
                let r = countries[Math.floor(Math.random() * countries.length)];
                if(!options.find(o => o.c === r.c)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                // عرض الاسم بالعربي وتحته بالإنجليزي
                btn.innerHTML = `<span>${opt.ar}</span><span class="en-name">${opt.en}</span>`;
                btn.onclick = () => checkAnswer(btn, opt.c === current.c);
                grid.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            timeLeft = 100; clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 1.2;
                document.getElementById('timer-bar').style.width = timeLeft + '%';
                if (timeLeft <= 0) { clearInterval(timer); checkAnswer(null, false); }
            }, 100);
        }

        function checkAnswer(btn, isCorrect) {
            clearInterval(timer);
            const all = document.querySelectorAll('.option');
            all.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                score++;
                confetti({ particleCount: 120, spread: 70, origin: { y: 0.7 } });
            } else {
                if(btn) btn.classList.add('wrong');
                all.forEach(b => {
                    if(b.innerHTML.includes(gameSet[currentIndex].ar)) b.classList.add('correct');
                });
            }

            setTimeout(() => { currentIndex++; showQuestion(); }, 1800);
        }

        function endGame() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score-val').innerText = score + "/10";
        }

        initGame();
    </script>
</body>
</html>
